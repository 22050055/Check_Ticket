<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tourism Gate — Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg-base:    #050810;
        --bg-surface: #0B1120;
        --bg-card:    #0F1929;
        --bg-hover:   #162035;
        --border:     rgba(0, 229, 255, 0.12);
        --border-dim: rgba(255, 255, 255, 0.07);
        --cyan:       #00E5FF;
        --cyan-dim:   rgba(0, 229, 255, 0.12);
        --green:      #00FF88;
        --green-dim:  rgba(0, 255, 136, 0.12);
        --red:        #FF3366;
        --red-dim:    rgba(255, 51, 102, 0.12);
        --amber:      #FFB800;
        --text-1: #EEF2FF;
        --text-2: #6B7FA3;
        --text-3: #2D3E5A;
        --font-display: 'Syne', sans-serif;
        --font-mono:    'DM Mono', monospace;
        --radius-sm: 6px; --radius-md: 12px; --radius-lg: 20px;
      }
      html, body, #root { height: 100%; background: var(--bg-base); color: var(--text-1); font-family: var(--font-mono); -webkit-font-smoothing: antialiased; }
      .ant-layout { background: var(--bg-base) !important; }
      .ant-layout-sider { background: var(--bg-surface) !important; border-right: 1px solid var(--border-dim) !important; }
      .ant-menu.ant-menu-dark { background: transparent !important; }
      .ant-menu-dark .ant-menu-item { color: var(--text-2) !important; font-family: var(--font-mono); font-size: 13px; border-radius: var(--radius-sm) !important; margin: 2px 8px !important; width: calc(100% - 16px) !important; }
      .ant-menu-dark .ant-menu-item:hover { background: var(--bg-hover) !important; color: var(--text-1) !important; }
      .ant-menu-dark .ant-menu-item-selected { background: var(--cyan-dim) !important; color: var(--cyan) !important; border-right: none !important; }
      .ant-card { background: var(--bg-card) !important; border: 1px solid var(--border-dim) !important; border-radius: var(--radius-md) !important; }
      .ant-card-head { background: transparent !important; border-bottom: 1px solid var(--border-dim) !important; color: var(--text-1) !important; }
      .ant-card-head-title { color: var(--text-1) !important; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
      .ant-table { background: transparent !important; }
      .ant-table-thead > tr > th { background: var(--bg-surface) !important; color: var(--text-2) !important; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border-dim) !important; border-top: none !important; }
      .ant-table-tbody > tr > td { border-bottom: 1px solid var(--border-dim) !important; color: var(--text-1) !important; font-family: var(--font-mono); background: transparent !important; }
      .ant-table-tbody > tr:hover > td { background: var(--bg-hover) !important; }
      .ant-statistic-title { color: var(--text-2) !important; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
      .ant-statistic-content { font-family: var(--font-display) !important; color: var(--text-1) !important; }
      .ant-statistic-content-value { font-family: var(--font-display) !important; }
      .ant-btn-primary { background: var(--cyan) !important; border-color: var(--cyan) !important; color: #050810 !important; font-family: var(--font-mono); font-weight: 500; letter-spacing: 0.05em; }
      .ant-btn-primary:hover { opacity: 0.85 !important; }
      .ant-input, .ant-input-password { background: var(--bg-surface) !important; border: 1px solid var(--border-dim) !important; color: var(--text-1) !important; font-family: var(--font-mono) !important; }
      .ant-input:focus, .ant-input-focused { border-color: var(--cyan) !important; box-shadow: 0 0 0 2px var(--cyan-dim) !important; }
      .ant-input::placeholder { color: var(--text-3) !important; }
      .ant-form-item-label > label { color: var(--text-2) !important; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
      .ant-select-selector { background: var(--bg-surface) !important; border-color: var(--border-dim) !important; color: var(--text-1) !important; }
      .ant-picker { background: var(--bg-surface) !important; border-color: var(--border-dim) !important; color: var(--text-1) !important; }
      .ant-tag { font-family: var(--font-mono); font-size: 11px; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
      .fade-in { animation: fadeUp 0.35s ease both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
